name: Build JAR on server and run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e

            cd ~/projects/PimpTelegramBot

            set -a
            source .env
            set +a

            echo "Pull latest code"
            git fetch origin
            git reset --hard origin/main

            echo "Build project with Maven"
            chmod +x mvnw
            ./mvnw clean package -DskipTests

            echo "Stop old app"
            if [ -f app.pid ]; then
              PID=$(cat app.pid)
              if ps -p "$PID" > /dev/null 2>&1; then
                kill "$PID" || true
              fi
              rm -f app.pid
            fi

            echo "Start new app"
            nohup java -jar target/pimp.jar "$MY_SECRET" >> app.log 2>&1 < /dev/null &
            echo $! > app.pid

            sleep 3
            echo "Started PID $(cat app.pid)"
