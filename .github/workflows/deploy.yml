name: Build APK on server and restart

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Execute commands on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            cd /projects/PimpTelegramBot

            echo "Pull latest code"
            git fetch origin
            git reset --hard origin/main

            echo "Build project with Maven"
            mvn clean package -DskipTests

            echo "Stop old app"
            if [ -f app.pid ]; then
              PID=$(cat app.pid)
              if ps -p $PID > /dev/null 2>&1; then
                kill $PID || true
              fi
              rm -f app.pid
            fi

            pkill -f "pimp.jar" || true

            echo "Start new app"
            nohup java -jar target/pimp.jar >> app.log 2>&1 < /dev/null &
            echo $! > app.pid
